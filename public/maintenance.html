<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maintenance</title>
    <style>
      :root {
        --bg: #ffffff;
        --text: #111111;
        --muted: rgba(17, 17, 17, 0.65);
        --border: rgba(17, 17, 17, 0.2);
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        max-width: 560px;
        width: 100%;
        border: 2px solid #111;
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.12);
      }
      h1 {
        font-size: 28px;
        line-height: 1.1;
        margin: 0 0 12px;
      }
      p {
        margin: 0 0 12px;
        color: var(--muted);
        line-height: 1.5;
      }
      .meta {
        margin-top: 18px;
        padding-top: 14px;
        border-top: 1px solid var(--border);
        font-size: 13px;
        color: var(--muted);
      }
      .pill {
        display: inline-block;
        border: 1px solid #111;
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 12px;
        margin-bottom: 12px;
      }
      a { color: inherit; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="pill">Maintenance mode</div>
        <h1>We’ll be right back.</h1>
        <p>
          We’re doing a quick update to keep things running smoothly.
          Please refresh in a few minutes.
        </p>
        <p>
          If you need help urgently, reply to your last email or contact support.
        </p>
        <div class="meta">
          Tip: if you’re mid-checkout, don’t worry — billing is handled securely by Stripe.
        </div>
      </div>
    </div>
  </body>
</html>
